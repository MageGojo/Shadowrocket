Final = select, Auto, DIRECT, policy-regex-filter=(?i)^((?!(剩余|流量|到期|过期|重置|套餐|续费|续期|官网|官方|网址|网站|订阅|客服|工单|公告|访问|失联|防失联|购买|优惠|折扣|有效期|测速|邮箱|更新|频道|群组|电报|欢迎|感谢|Expire|Traffic|Reset|🇨🇳|大陆|大陸|回国|回國)).)*$

